id: terraform_security_review
namespace: demo.security

description: |
  Upload Terraform files, run Checkov, and generate a security report.

inputs:
  - id: terraform_file
    type: FILE
    required: true
    description: Upload a Terraform (.tf) file

tasks:
  - id: run_checkov
    type: io.kestra.plugin.scripts.python.Commands
    containerImage: bridgecrew/checkov:latest
    warningOnStdErr: false
    commands:
      - cp {{ inputs.terraform_file }} main.tf
      - checkov -f main.tf --output cli --output-file-path console

pluginDefaults:
  - type: io.kestra.plugin.scripts.python.Commands
    values:
      taskRunner:
        type: io.kestra.plugin.core.runner.Process