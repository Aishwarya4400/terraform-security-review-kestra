id: terraform_security_review
namespace: demo.security

description: |
  Upload any Terraform file and scan it with Checkov.

inputs:
  - id: terraform_file
    type: FILE
    required: true
    description: Upload a Terraform (.tf) file

tasks:
  - id: run_checkov
    type: io.kestra.plugin.scripts.shell.Commands
    containerImage: python:3.11-slim
    commands:
      - apt-get update
      - apt-get install -y git curl build-essential
      - pip install --no-cache-dir checkov
      - 'echo Uploaded file path: {{ inputs.terraform_file }}'
      - 'cp {{ inputs.terraform_file }} uploaded.tf'
      - 'echo ===== Uploaded Terraform File ====='
      - 'cat uploaded.tf'
      - 'echo =================================='
      - 'sh -c "checkov -f uploaded.tf > checkov-report.txt || true"'
      - 'sh -c "checkov -f uploaded.tf -o json > checkov-report.json || true"'

    outputFiles:
      - uploaded.tf
      - checkov-report.txt
      - checkov-report.json

pluginDefaults:
  - type: io.kestra.plugin.scripts.shell.Commands
    values:
      taskRunner:
        type: io.kestra.plugin.core.runner.Process